name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          swift build -c release

      - name: Create App Bundle
        run: |
          # Create the app bundle structure
          mkdir -p PaperWM.app/Contents/MacOS
          mkdir -p PaperWM.app/Contents/Resources

          # Copy the executable
          cp .build/release/PaperWMApp PaperWM.app/Contents/MacOS/PaperWM

          # Create Info.plist
          cat > PaperWM.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>PaperWM</string>
              <key>CFBundleIdentifier</key>
              <string>com.paperframe.paperwm</string>
              <key>CFBundleName</key>
              <string>PaperWM</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Code Sign App
        run: |
          # Sign the app (requires APPLE_CERTIFICATE and APPLE_ID env vars)
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12
            security import certificate.p12 -k ~/Library/Keychains/login.keychain -P "$APPLE_CERTIFICATE_PWD"
            codesign --force --deep --sign "Apple Development" PaperWM.app
          else
            echo "No certificate provided - skipping code signing"
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}

      - name: Create ZIP Archive
        run: |
          zip -r PaperWM.zip PaperWM.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperWM
          path: PaperWM.zip

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: PaperWM.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}